[env:m5stack-sticks3]
platform = espressif32
; The installed PlatformIO espressif32 platform does not currently expose
; m5stack-sticks3. Use the closest M5Stack ESP32-S3 board definition.
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
; StickS3 native USB can disconnect on macOS when esptool auto-resets it.
; Put the device in download mode manually, then upload without a pre-reset.
board_upload.before_reset = no_reset
board_upload.after_reset = hard_reset
extra_scripts = pre:scripts/generate_config.py
lib_deps =
  m5stack/M5Unified
  m5stack/M5GFX
  bblanchon/ArduinoJson
  https://github.com/rjsachse/ESP32-SpeexDSP.git
